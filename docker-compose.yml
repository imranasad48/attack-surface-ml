services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: asm
      POSTGRES_PASSWORD: asm
      POSTGRES_DB: asm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asm"]
      interval: 5s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri postgresql://asm:asm@postgres:5432/asm
      --default-artifact-root /mlflow/artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow-artifacts:/mlflow/artifacts
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    image: asm-api:dev
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mlflow
    profiles: ["app"]   # don't auto-start with `compose up`

volumes:
  pgdata:
  mlflow-artifacts:
