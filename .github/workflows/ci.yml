name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev,security,dashboard]"

      - name: Lint
        run: ruff check src tests

      - name: Format check
        run: ruff format --check src tests

      - name: Type check
        run: mypy src

      - name: Test
        run: pytest --cov=asm --cov-fail-under=70

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: htmlcov/
          if-no-files-found: ignore
