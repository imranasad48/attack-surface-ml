name: Deploy to EC2

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - '*.md'
      - '.gitignore'
      - '.github/workflows/ci.yml'
      - '.github/workflows/security.yml'
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & push API image to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.api
          push: true
          tags: |
            ghcr.io/daniyal-hussain01/attack-surface-ml:latest
            ghcr.io/daniyal-hussain01/attack-surface-ml:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

  deploy:
    name: Deploy to EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.EC2_SSH_KEY }}

      - name: Add EC2 host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pull new image and restart api
        run: |
          ssh -o StrictHostKeyChecking=yes \
              -o ServerAliveInterval=10 \
              -o ServerAliveCountMax=3 \
              ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} <<'EOF'
            set -euo pipefail
            cd ~/attack-surface-ml
            echo "=== git status before pull ==="
            git status --short
            echo "=== stashing any local edits (safety net) ==="
            git stash push -u -m "deploy-$(date -u +%Y%m%dT%H%M%SZ)" || echo "(nothing to stash)"
            echo "=== fetching origin ==="
            git fetch --all --prune
            echo "=== checking out main ==="
            git checkout main
            echo "=== fast-forwarding to origin/main ==="
            git reset --hard origin/main
            echo "=== docker compose pull api ==="
            docker compose -f docker-compose.prod.yml pull api
            echo "=== docker compose up -d api ==="
            docker compose -f docker-compose.prod.yml up -d api
            echo "=== ps ==="
            docker compose -f docker-compose.prod.yml ps
          EOF

      - name: Health check
        run: |
          echo "Waiting 20s for api container to become healthy..."
          sleep 20
          for i in $(seq 1 12); do
            HTTP=$(curl -s -o /tmp/health.json -w "%{http_code}" https://${{ secrets.EC2_HOST }}/health || true)
            BODY=$(cat /tmp/health.json 2>/dev/null || echo "")
            echo "[$i/12] HTTP=$HTTP body=$BODY"
            if [ "$HTTP" = "200" ] && echo "$BODY" | grep -q '"model_loaded":"True"'; then
              echo "Deploy healthy. ✅"
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after 2 minutes. ❌"
          exit 1

